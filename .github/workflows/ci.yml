name: CI

# Quality gate. Git hooks were removed in favour of CI enforcement, so every
# push to main and every pull request must pass lint, formatting, types, and tests.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Supersede an older in-flight run for the same ref (PR pushes, rapid commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository
        uses: actions/checkout@v7

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test
