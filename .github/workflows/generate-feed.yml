name: Generate Feed

on:
  # Every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Deploy promptly after a merge to main, still gated on a real content change.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Don't cancel an in-flight Pages deployment — let production deploys finish
  # (per GitHub's official Pages workflow template).
  cancel-in-progress: false

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Check out Repository
        uses: actions/checkout@v7

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Feed
        env:
          DSE_DISCORD_GUILD_ID: ${{ secrets.DSE_DISCORD_GUILD_ID }}
          DSE_DISCORD_BOT_TOKEN: ${{ secrets.DSE_DISCORD_BOT_TOKEN }}
          DSE_DISCORD_CALENDAR_HEX_COLOR: ${{ secrets.DSE_DISCORD_CALENDAR_HEX_COLOR }}
        run: npm run generate:feed

      - name: Detect change
        id: diff
        run: |
          # Derive the published Pages URL from the repo so forks/renames work.
          URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/events.ics"
          curl -fsSL "$URL" -o prev.ics || true
          if [ -f prev.ics ] && cmp -s dist/events.ics prev.ics; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"   # missing/failed fetch ⇒ deploy
          fi

      - name: Upload Pages Artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: "Deploy"
    if: needs.build.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
