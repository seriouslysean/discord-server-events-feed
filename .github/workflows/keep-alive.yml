name: Keep Alive

on:
  schedule:
    # Keep scheduled workflows enabled — GitHub disables them after 60 days of no commits.
    # Fires on the 1st and 21st of every other month; max gap ~41 days, comfortably under 60.
    - cron: "0 0 1,21 */2 *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Update keepalive timestamp
        run: |
          echo "Last keepalive: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > .github/keepalive

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive to prevent workflow disable"
          git push
